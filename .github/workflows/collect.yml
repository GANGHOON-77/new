name: Collect news and update map

on:
  schedule:
    # KST 06:00/12:00/18:00/00:00 == UTC 21:00(전날)/03:00/09:00/15:00 (설계문서 12장)
    - cron: "0 21,3,9,15 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collection pipeline
        run: python scripts/collect_and_build.py

      - name: Run world news collection pipeline
        run: python scripts/collect_world_news.py
        continue-on-error: true  # 해외 수집/번역이 실패해도 국내뉴스 커밋은 그대로 진행한다

      - name: Commit updated news map
        run: |
          git config user.name "news-map-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/news_map.json
          if [ -f docs/world_news_map.json ]; then git add docs/world_news_map.json; fi
          git diff --cached --quiet && echo "no changes" || git commit -m "chore: update news map $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
