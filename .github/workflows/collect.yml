name: Collect news and update map

on:
  schedule:
    # GitHub Actions cron is always UTC.
    # Seoul/KST targets: 00:00, 06:00, 12:00, 18:00
    # UTC conversion:    15:00, 21:00, 03:00, 09:00
    - cron: "0 15,21,3,9 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
      NEWS_MAP_TIMEZONE: Asia/Seoul
      NEWS_MAP_TARGET_TIMES_KST: "00:00,06:00,12:00,18:00"
    steps:
      - uses: actions/checkout@v4

      - name: Show scheduler time
        run: |
          echo "KST now: $(date +'%Y-%m-%d %H:%M:%S %Z')"
          echo "UTC now: $(TZ=UTC date +'%Y-%m-%d %H:%M:%S %Z')"
          echo "Target collection times (KST): ${NEWS_MAP_TARGET_TIMES_KST}"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collection pipeline
        run: python scripts/collect_and_build.py

      - name: Run world news collection pipeline
        run: python scripts/collect_world_news.py
        continue-on-error: true  # Keep domestic news updates even if world news collection/translation fails.

      - name: Commit updated news map
        run: |
          git config user.name "news-map-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/news_map.json docs/keyword_news_map.json
          if [ -f docs/world_news_map.json ]; then git add docs/world_news_map.json; fi
          git diff --cached --quiet && echo "no changes" || git commit -m "chore: update news map $(date +'%Y-%m-%d %H:%M KST')"
          git push

  deploy:
    needs: collect
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      # Injected only into the deployment artifact below, never committed to git.
      - name: Write YouTube API key config
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          echo "window.YOUTUBE_API_KEY = \"${YOUTUBE_API_KEY}\";" > docs/youtube-config.js

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - id: deployment
        uses: actions/deploy-pages@v4
