<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘의 뉴스지도</title>
<link rel="stylesheet" href="style.css">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b1622">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="뉴스지도">
</head>
<body>
  <header class="topbar">
    <div class="topbar-row">
      <div class="topbar-left">
        <h1>오늘의 뉴스지도</h1>
        <span id="today-date" class="date"></span>
        <span id="updated-at" class="updated"></span>
        <button id="refresh-btn" class="icon-btn" title="새로고침">⟳</button>
      </div>
      <div class="topbar-right">
        <div class="legend-block" id="category-legend-block">
          <div class="legend" id="category-legend">분야별 색상</div>
          <button id="category-color-reset" class="reset-link" type="button" title="분야별 색상을 기본값으로 되돌립니다">초기화</button>
        </div>
        <div class="legend-block hidden" id="region-legend-block">
          <div class="legend" id="region-legend">지역별 색상</div>
          <button id="region-color-reset" class="reset-link" type="button" title="지역별 색상을 기본값으로 되돌립니다">초기화</button>
        </div>
      </div>
    </div>
    <nav class="mode-tabs" aria-label="뉴스 지도 탭">
      <button id="domestic-tab" class="mode-tab active" type="button">국내뉴스</button>
      <button id="world-tab" class="mode-tab" type="button">해외뉴스</button>
      <button id="keyword-tab" class="mode-tab" type="button">키워드 뉴스</button>
    </nav>
    <div id="keyword-toolbar" class="keyword-toolbar hidden">
      <form id="keyword-form" class="keyword-form">
        <input id="keyword-input" class="keyword-input" type="search" placeholder="키워드 입력" autocomplete="off">
        <button class="keyword-add" type="submit">추가</button>
        <button id="keyword-clear" class="keyword-clear" type="button">전체삭제</button>
      </form>
      <div id="keyword-chips" class="keyword-chips" aria-label="설정된 키워드"></div>
    </div>
    <p class="tagline">중요도와 관심도에 따라 오늘의 뉴스를 지도처럼 보여줍니다.</p>
  </header>

  <main class="layout">
    <section id="treemap" class="treemap"></section>
    <aside id="keyword-video-panel" class="keyword-video-panel hidden"></aside>
    <aside id="detail-panel" class="detail-panel hidden"></aside>
  </main>

  <footer class="footer">
    <span id="meta-line"></span>
    · 0.1버전 데모(실데이터, 규칙기반 점수, LLM 미사용) · 클러스터링: 문자 n-gram TF-IDF(임시, 임베딩 모델 아님)
    · <button id="algo-link" class="link-btn">알고리즘 설명 보기</button>
  </footer>

  <div id="algo-modal" class="modal hidden">
    <div class="modal-box">
      <button class="close-btn" id="algo-close">×</button>
      <h2>알고리즘 설명 (0.1버전 산식)</h2>
      <div id="algo-body"></div>
    </div>
  </div>

<script src="youtube-config.js"></script>
<script src="app.js"></script>
</body>
</html>
