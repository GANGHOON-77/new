<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘의 뉴스지도</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-row">
      <div class="topbar-left">
        <h1>오늘의 뉴스지도</h1>
        <span id="today-date" class="date"></span>
        <span id="updated-at" class="updated"></span>
        <button id="refresh-btn" class="icon-btn" title="새로고침">⟳</button>
      </div>
      <div class="topbar-right">
        <button class="ghost-btn" disabled title="0.1버전에서는 최신 회차만 제공">ⓘ 이전 업데이트 보기</button>
        <div class="segmented">
          <button class="seg-btn active" disabled>중요도순 보기</button>
          <button class="seg-btn" disabled title="0.1버전은 중요도순 고정">최신순 보기</button>
        </div>
        <div class="legend" id="category-legend">분야별 색상</div>
      </div>
    </div>
    <p class="tagline">중요도와 관심도에 따라 오늘의 뉴스를 지도처럼 보여줍니다.</p>
  </header>

  <main class="layout">
    <section id="treemap" class="treemap"></section>
    <aside id="detail-panel" class="detail-panel hidden"></aside>
  </main>

  <footer class="footer">
    <span id="meta-line"></span>
    · 0.1버전 데모(실데이터, 규칙기반 점수, LLM 미사용) · 클러스터링: 문자 n-gram TF-IDF(임시, 임베딩 모델 아님)
    · <button id="algo-link" class="link-btn">알고리즘 설명 보기</button>
  </footer>

  <div id="algo-modal" class="modal hidden">
    <div class="modal-box">
      <button class="close-btn" id="algo-close">×</button>
      <h2>알고리즘 설명 (0.1버전 산식)</h2>
      <div id="algo-body"></div>
    </div>
  </div>

<script src="app.js"></script>
</body>
</html>
